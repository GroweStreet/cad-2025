<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container" style="max-width:400px; margin-top:100px">
    <div class="card shadow-sm p-4">
        <h4 class="mb-4 text-center">Вход в систему</h4>

        <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль</div>
        <div th:if="${param.logout}" class="alert alert-success">Вы вышли из системы</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>

        <div class="mt-3 text-muted small">
            <b>user</b> / user — просмотр заказов<br>
            <b>manager</b> / manager — полный доступ
        </div>
    </div>
</div>
</body>
</html>
