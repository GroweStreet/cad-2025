<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создать заказ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Создать заказ</h2>
<form th:action="@{/orders}" method="post">
    <div class="mb-3">
        <label class="form-label">Покупатель</label>
        <select name="customerId" class="form-select">
            <option th:each="c : ${customers}" th:value="${c.customerId}" th:text="${c.name}"></option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Товар</label>
        <select name="productId" class="form-select">
            <option th:each="p : ${products}"
                    th:value="${p.productId}"
                    th:text="${p.name} + ' (' + ${p.price} + ' руб.)'"></option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Количество</label>
        <input type="number" name="quantity" value="1" min="1" class="form-control" style="width:120px">
    </div>
    <button type="submit" class="btn btn-success">Оформить</button>
    <a th:href="@{/orders}" class="btn btn-secondary">Отмена</a>
</form>

</body>
</html>
