<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Список заказов</h2>
    <div>
        <span class="me-3 text-muted small">
            Вы вошли как: <b sec:authentication="name"></b>
        </span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-outline-secondary btn-sm">Выйти</button>
        </form>
    </div>
</div>

<a sec:authorize="hasRole('MANAGER')"
   th:href="@{/orders/new}" class="btn btn-primary mb-3">Создать заказ</a>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th><th>Покупатель</th><th>Дата</th><th>Сумма</th><th>Статус</th>
            <th sec:authorize="hasRole('MANAGER')">Действия</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}"></td>
            <td th:text="${order.customer.name}"></td>
            <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy')}"></td>
            <td th:text="${order.totalPrice}"></td>
            <td th:text="${order.status}"></td>
            <td sec:authorize="hasRole('MANAGER')">
                <a th:href="@{/orders/{id}/edit(id=${order.orderId})}"
                   class="btn btn-sm btn-warning">Изменить</a>
                <form th:action="@{/orders/{id}/delete(id=${order.orderId})}"
                      method="post" style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Удалить?')">Удалить</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
