<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Изменить заказ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Изменить заказ #<span th:text="${order.orderId}"></span></h2>
<form th:action="@{/orders/{id}/edit(id=${order.orderId})}" method="post">
    <div class="mb-3">
        <label class="form-label">Статус</label>
        <select name="status" class="form-select" style="width:200px">
            <option value="NEW"       th:selected="${order.status == 'NEW'}">NEW</option>
            <option value="PAID"      th:selected="${order.status == 'PAID'}">PAID</option>
            <option value="SHIPPED"   th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
            <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">DELIVERED</option>
            <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Адрес доставки</label>
        <input type="text" name="shippingAddress" th:value="${order.shippingAddress}"
               class="form-control">
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a th:href="@{/orders}" class="btn btn-secondary">Отмена</a>
</form>

</body>
</html>
